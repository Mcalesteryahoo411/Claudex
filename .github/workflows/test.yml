name: Cross platform tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: Git ref to test (defaults to the triggering ref)
        required: false
        type: string

permissions:
  contents: read

jobs:
  unix:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Run isolated Bash tests
        run: ./test.sh

  windows:
    name: windows-latest
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Run isolated PowerShell tests
        shell: powershell
        run: |
          .\test.ps1
          .\tests\self-update-lock-regressions.ps1

  legacy-linux-node:
    name: ubuntu-20.04-managed-node
    runs-on: ubuntu-latest
    container: ubuntu:20.04
    timeout-minutes: 10
    steps:
      - name: Install checkout prerequisites
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y ca-certificates git
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - name: Verify Node 18+ fallback on the oldest supported Ubuntu
        run: |
          node_root="$(dirname "$(dirname "$(readlink -f "$(command -v node)")")")"
          CLAUDEX_TEST_MODE=1 CLAUDEX_TEST_MANAGED_NODE_DIR="$node_root" ./tests/legacy-linux-node.sh

  node-18-shared-runtime:
    name: node-18-shared-runtime
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 18
      - name: Verify the minimum supported shared Node.js runtime
        run: npm test

  package-artifacts:
    name: package-artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Verify package metadata and Node tests
        run: npm test
      - name: Verify reproducible and type-safe release archives
        run: ./scripts/check-release-artifacts.sh
