name: Cross-platform tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unix:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run isolated Bash tests
        run: ./test.sh

  windows:
    name: windows-latest
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run isolated PowerShell tests
        shell: powershell
        run: .\test.ps1

  legacy-linux-node:
    name: ubuntu-20.04-managed-node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify Node 18+ fallback on the oldest supported Ubuntu
        run: docker run --rm -v "$PWD:/work:ro" ubuntu:20.04 bash /work/tests/legacy-linux-node.sh

  package-artifacts:
    name: package-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify package metadata and Node tests
        run: npm test
      - name: Build release archives
        run: ./scripts/build-release.sh
