name: Release assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Build distribution archives
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          test "$RELEASE_TAG" = "v$(node -p "require('./package.json').version")"
          npm test
          ./scripts/build-release.sh "${RELEASE_TAG#v}"
          tar -tzf "dist/claudex-${RELEASE_TAG#v}.tar.gz" | grep -Fx "claudex-${RELEASE_TAG#v}/install.sh"
          tar -tzf "dist/claudex-${RELEASE_TAG#v}.tar.gz" | grep -Fx "claudex-${RELEASE_TAG#v}/skill-bridge.cjs"
          tar -tzf "dist/claudex-${RELEASE_TAG#v}.tar.gz" | grep -Fx "claudex-${RELEASE_TAG#v}/skills/usage-limit/SKILL.md"
          unzip -Z1 "dist/claudex-${RELEASE_TAG#v}-windows.zip" | grep -Fx "claudex-${RELEASE_TAG#v}/install.ps1"
          unzip -Z1 "dist/claudex-${RELEASE_TAG#v}-windows.zip" | grep -Fx "claudex-${RELEASE_TAG#v}/skill-bridge.cjs"
          unzip -Z1 "dist/claudex-${RELEASE_TAG#v}-windows.zip" | grep -Fx "claudex-${RELEASE_TAG#v}/skills/usage-limit/SKILL.windows.md"
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" dist/*.zip dist/*.tar.gz dist/SHA256SUMS --clobber
